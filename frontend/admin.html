<!DOCTYPE html>
<html lang="en" class="h-full" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DentalAI - Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body class="h-full bg-gray-50">

    <header class="w-full sticky top-0 z-40 bg-white border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="w-10 h-10 rounded-lg bg-red-600 flex items-center justify-center">
                    <i data-lucide="shield" class="text-white"></i>
                </div>
                <span class="text-xl font-bold text-red-600">Admin Panel</span>

                <nav class="hidden md:flex items-center gap-8">
                    <a href="index.html" class="text-sm font-medium text-gray-700 hover:text-blue-600" data-i18n="nav_home">Home</a>
                    <a href="upload.html" class="text-sm font-medium text-gray-700 hover:text-blue-600"
                        data-i18n="nav_analyze">Analyze</a>
                    <a href="profile.html" class="text-sm font-medium text-gray-700 hover:text-blue-600"
                        data-i18n="nav_profile">Profile</a>
                          <a href="about.html" class="text-sm font-medium text-gray-700 hover:text-blue-600" data-i18n="nav_about">About Us</a>
                </nav>
            </div>
            <div class="flex items-center gap-4">
                <button id="lang-toggle"
                    class="bg-gray-100 px-4 py-2 rounded-full text-sm font-semibold flex items-center gap-2">
                    <i data-lucide="globe" class="w-4 h-4"></i>
                    <span id="lang-text">عربي</span>
                </button>
                <button onclick="logout()" class="text-sm text-red-500 font-medium"
                    data-i18n="nav_logout">Logout</button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-6 lg:p-12 space-y-12">
        <!-- Users Section -->
        <section class="bg-white rounded-3xl p-8 shadow-xl border border-gray-100">
            <h2 class="text-2xl font-bold text-gray-900 mb-6 flex items-center gap-2">
                <i data-lucide="users" class="text-blue-600"></i>
                Manage Users
            </h2>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="border-b border-gray-100 text-gray-500 text-sm">
                            <th class="py-4 px-4">ID</th>
                            <th class="py-4 px-4">Name</th>
                            <th class="py-4 px-4">Email</th>
                            <th class="py-4 px-4">Role</th>
                            <th class="py-4 px-4">Action</th>
                        </tr>
                    </thead>
                    <tbody id="users-table">
                        <!-- Users will be injected here -->
                    </tbody>
                </table>
            </div>
        </section>

        <!-- Analyses Section -->
        <section class="bg-white rounded-3xl p-8 shadow-xl border border-gray-100">
            <h2 class="text-2xl font-bold text-gray-900 mb-6 flex items-center gap-2">
                <i data-lucide="activity" class="text-green-600"></i>
                Recent Analyses
            </h2>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="border-b border-gray-100 text-gray-500 text-sm">
                            <th class="py-4 px-4">ID</th>
                            <th class="py-4 px-4">User</th>
                            <th class="py-4 px-4">Prediction</th>
                            <th class="py-4 px-4">Confidence</th>
                            <th class="py-4 px-4">Date</th>
                        </tr>
                    </thead>
                    <tbody id="analyses-table">
                        <!-- Analyses will be injected here -->
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="js/main.js"></script>
    <script>
        async function loadDashboard() {
            const user = JSON.parse(localStorage.getItem('user'));
            if (!user || user.role !== 'admin') {
                window.location.href = 'login.html';
                return;
            }

            try {
                const response = await fetch('http://127.0.0.1:5000/admin/dashboard');
                const data = await response.json();
                if (data.success) {
                    const usersTable = document.getElementById('users-table');
                    usersTable.innerHTML = data.users.map(u => `
                        <tr class="border-b border-gray-50 hover:bg-gray-50 transition">
                            <td class="py-4 px-4 text-sm">${u.id}</td>
                            <td class="py-4 px-4 font-medium">${u.name}</td>
                            <td class="py-4 px-4 text-sm text-gray-500">${u.email}</td>
                            <td class="py-4 px-4"><span class="px-2 py-1 rounded-full text-xs font-bold ${u.role === 'admin' ? 'bg-red-100 text-red-600' : 'bg-blue-100 text-blue-600'}">${u.role}</span></td>
                            <td class="py-4 px-4">
                                ${u.role !== 'admin' ? `<button onclick="deleteUser(${u.id})" class="text-red-500 hover:text-red-700"><i data-lucide="trash-2" class="w-4 h-4"></i></button>` : ''}
                            </td>
                        </tr>
                    `).join('');

                    const analysesTable = document.getElementById('analyses-table');
                    analysesTable.innerHTML = data.analyses.map(a => `
                        <tr class="border-b border-gray-50 hover:bg-gray-50 transition">
                            <td class="py-4 px-4 text-sm">${a.id}</td>
                            <td class="py-4 px-4 font-medium">${a.user_name}</td>
                            <td class="py-4 px-4 text-sm font-bold text-blue-600">${a.prediction}</td>
                            <td class="py-4 px-4 text-sm">${a.confidence}%</td>
                            <td class="py-4 px-4 text-sm text-gray-500">${a.date}</td>
                        </tr>
                    `).join('');

                    lucide.createIcons();
                }
            } catch (error) {
                console.error('Error loading dashboard');
            }
        }

        async function deleteUser(id) {
            if (confirm('Are you sure you want to delete this user and all their data?')) {
                try {
                    const response = await fetch(`http://127.0.0.1:5000/admin/delete-user/${id}`, { method: 'DELETE' });
                    const result = await response.json();
                    if (result.success) {
                        loadDashboard();
                    }
                } catch (error) {
                    Swal.fire({
                        icon: 'error',
                        title: 'فشل الحذف',
                        text: 'حدث خطأ أثناء حذف المستخدم، يرجى المحاولة مرة أخرى',
                        confirmButtonText: 'حسناً',
                        confirmButtonColor: '#d33'
                    });
                }
            }
        }

        document.addEventListener('DOMContentLoaded', loadDashboard);
    </script>
</body>

</html>
