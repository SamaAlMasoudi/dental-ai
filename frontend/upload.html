<!DOCTYPE html>
<html lang="en" class="h-full" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DentalAI - Upload X-ray</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="h-full bg-gray-50 flex flex-col">

    <header class="w-full sticky top-0 z-40 bg-white border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="w-10 h-10 rounded-lg bg-blue-600 flex items-center justify-center">
                    <i data-lucide="smile" class="text-white"></i>
                </div>
                <span class="text-xl font-bold text-blue-600">DentalAI</span>
            </div>
            <nav class="hidden md:flex items-center gap-8">
                <a href="index.html" class="text-sm font-medium text-gray-700 hover:text-blue-600" data-i18n="nav_home">Home</a>
                <a href="upload.html" class="text-sm font-medium text-blue-600" data-i18n="nav_analyze">Analyze</a>
                <a href="profile.html" class="text-sm font-medium text-gray-700 hover:text-blue-600" data-i18n="nav_profile">Profile</a>
            <a href="about.html" class="text-sm font-medium text-gray-700 hover:text-blue-600" data-i18n="nav_about">About Us</a>
                </nav>
            <div class="flex items-center gap-4">
                <button id="lang-toggle" class="bg-gray-100 px-4 py-2 rounded-full text-sm font-semibold flex items-center gap-2">
                    <i data-lucide="globe" class="w-4 h-4"></i>
                    <span id="lang-text">عربي</span>
                </button>
                <a href="profile.html" class="w-10 h-10 rounded-full bg-blue-50 flex items-center justify-center text-blue-600 hover:bg-blue-100 transition">
                    <i data-lucide="user" class="w-5 h-5"></i>
                </a>
                <button onclick="logout()" class="text-sm text-red-500 font-medium" data-i18n="nav_logout">Logout</button>
            </div>
        </div>
    </header>

    <main class="flex-1 max-w-3xl mx-auto p-6 lg:p-12 w-full">
        <div class="bg-white rounded-3xl p-8 shadow-xl border border-gray-100 text-center">
            <h2 class="text-3xl font-bold text-gray-900 mb-2" data-i18n="upload_title">Drag & Drop Your X-ray</h2>
            <p class="text-gray-500 mb-8" data-i18n="upload_subtitle">or click to browse</p>
            
            <div class="border-2 border-dashed border-blue-200 rounded-2xl p-12 bg-blue-50/50 hover:bg-blue-50 transition-all cursor-pointer relative" onclick="document.getElementById('imageInput').click()">
                <input type="file" id="imageInput" class="hidden" accept="image/*" onchange="previewFile(event)">
                <div id="upload-placeholder">
                    <i data-lucide="upload-cloud" class="w-16 h-16 text-blue-400 mx-auto mb-4"></i>
                    <p class="text-blue-600 font-medium">Select Image File</p>
                </div>
                <div id="preview" class="hidden">
                    <img id="previewImg" src="#" alt="Preview" class="max-h-64 mx-auto rounded-xl shadow-md">
                </div>
            </div>

            <button id="analyzeBtn" onclick="analyzeImage()" class="w-full mt-8 py-4 bg-blue-600 text-white rounded-2xl font-bold text-lg hover:bg-blue-700 transition shadow-lg shadow-blue-100" data-i18n="analyze_btn">
                Analyze Now
            </button>
        </div>
    </main>

    <footer class="w-full bg-gray-900 text-white py-12">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <div class="flex items-center justify-center gap-2 mb-4">
                <div class="w-8 h-8 rounded-lg bg-blue-600 flex items-center justify-center">
                    <i data-lucide="smile" class="text-white w-5 h-5"></i>
                </div>
                <span class="text-xl font-bold">DentalAI</span>
            </div>
            <p class="text-gray-400 text-sm" data-i18n="footer_text">© 2026 DentalAI. All rights reserved.</p>
        </div>
    </footer>

    <script src="js/main.js"></script>
    <script>
        function previewFile(event) {
            const input = event.target;
            const preview = document.getElementById('preview');
            const previewImg = document.getElementById('previewImg');
            const placeholder = document.getElementById('upload-placeholder');

            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    previewImg.src = e.target.result;
                    preview.classList.remove('hidden');
                    placeholder.classList.add('hidden');
                }
                reader.readAsDataURL(input.files[0]);
            }
        }
    </script>
</body>
</html>
