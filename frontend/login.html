<!DOCTYPE html>
<html lang="en" class="h-full" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DentalAI - Login</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="h-full bg-gray-50 flex items-center justify-center p-4">
    <div class="max-w-md w-full space-y-8 bg-white p-8 rounded-2xl shadow-xl border border-gray-100">
        <div class="text-center">
            <div class="mx-auto h-12 w-12 rounded-xl bg-blue-600 flex items-center justify-center mb-4">
                <i data-lucide="smile" class="text-white w-8 h-8"></i>
            </div>
            <h2 class="text-3xl font-extrabold text-gray-900" data-i18n="login_title">Welcome Back</h2>
            <p class="mt-2 text-sm text-gray-600" data-i18n="login_subtitle">Please sign in to your account</p>
        </div>
        
        <form class="mt-8 space-y-6" id="loginForm">
            <div class="rounded-md shadow-sm space-y-4">
                <div>
                    <label for="email" class="sr-only">Email address</label>
                    <input id="email" name="email" type="email" required class="appearance-none rounded-xl relative block w-full px-4 py-3 border border-gray-300 placeholder-gray-500 text-gray-900 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm" data-i18n="email_label" placeholder="Email address">
                </div>
                <div>
                    <label for="password" class="sr-only">Password</label>
                    <input id="password" name="password" type="password" required class="appearance-none rounded-xl relative block w-full px-4 py-3 border border-gray-300 placeholder-gray-500 text-gray-900 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm" data-i18n="password_label" placeholder="Password">
                </div>
            </div>

            <div class="flex items-center justify-between">
                <div class="text-sm">
                    <a href="forgot-password.html" class="font-medium text-blue-600 hover:text-blue-500" data-i18n="forgot_password_link">Forgot Password?</a>
                </div>
            </div>

            <button type="submit" class="w-full flex justify-center py-3 px-4 border border-transparent text-sm font-bold rounded-xl text-white bg-blue-600 hover:bg-blue-700 transition-all" data-i18n="sign_in_btn">
                Sign in
            </button>
        </form>

        <div class="text-center mt-4">
            <p class="text-sm text-gray-600">
                <span data-i18n="no_account">Don't have an account?</span>
                <a href="register.html" class="font-medium text-blue-600 hover:text-blue-500" data-i18n="sign_up_link">Sign up now</a>
            </p>
        </div>

        <div class="pt-4 border-t border-gray-100 flex justify-center">
            <button id="lang-toggle" class="flex items-center gap-2 text-sm text-gray-500 hover:text-blue-600">
                <i data-lucide="globe" class="w-4 h-4"></i>
                <span id="lang-text">عربي</span>
            </button>
        </div>
    </div>

    <script src="js/main.js"></script>
<script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const formData = new FormData(e.target);
        const data = Object.fromEntries(formData.entries());
        
        try {
            const response = await fetch('http://127.0.0.1:5000/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const result = await response.json();
            if (result.success) {
                localStorage.setItem('user', JSON.stringify(result.user));
                if (result.user.role === 'admin') {
                    window.location.href = 'admin.html';
                } else {
                    window.location.href = 'index.html';
                }
            } else {
                Swal.fire({
                    text: result.message,
                    icon: 'error',
                    confirmButtonText: 'OK'
                });
            }
        } catch (error) {
            Swal.fire({
                text: 'Connection error',
                icon: 'error',
                confirmButtonText: 'OK'
            });
        }
    });
</script>

</body>
</html>
