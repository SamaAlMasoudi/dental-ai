<!DOCTYPE html>
<html lang="en" class="h-full scroll-smooth" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DentalAI - Home</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="h-full bg-white flex flex-col">

    <header class="w-full sticky top-0 z-40 bg-white/80 backdrop-blur-md border-b border-gray-100">
        <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="w-10 h-10 rounded-lg bg-blue-600 flex items-center justify-center">
                    <i data-lucide="smile" class="text-white"></i>
                </div>
                <span class="text-xl font-bold text-blue-600">DentalAI</span>
            </div>
            <nav class="hidden md:flex items-center gap-8">
                <a href="index.html" class="text-sm font-medium text-blue-600" data-i18n="nav_home">Home</a>
                <a href="upload.html" class="text-sm font-medium text-gray-700 hover:text-blue-600" data-i18n="nav_analyze">Analyze</a>
                <a href="profile.html" class="text-sm font-medium text-gray-700 hover:text-blue-600" data-i18n="nav_profile">Profile</a>
           <a href="about.html" class="text-sm font-medium text-gray-700 hover:text-blue-600" data-i18n="nav_about">About Us</a>
                </nav>
            <div class="flex items-center gap-4">
                <button id="lang-toggle" class="bg-gray-100 px-4 py-2 rounded-full text-sm font-semibold flex items-center gap-2">
                    <i data-lucide="globe" class="w-4 h-4"></i>
                    <span id="lang-text">عربي</span>
                </button>
                <a href="profile.html" class="w-10 h-10 rounded-full bg-blue-50 flex items-center justify-center text-blue-600 hover:bg-blue-100 transition">
                    <i data-lucide="user" class="w-5 h-5"></i>
                </a>
                <button onclick="logout()" class="text-sm text-red-500 font-medium" data-i18n="nav_logout">Logout</button>
            </div>
        </div>
    </header>

    <main class="flex-1">
        <section class="py-20 px-4 text-center max-w-4xl mx-auto">
            <div class="mb-6 inline-block px-4 py-2 bg-blue-50 text-blue-600 rounded-full font-bold text-sm" id="user-greeting">
                Welcome back!
            </div>
            <h1 class="text-5xl font-extrabold text-gray-900 mb-6 leading-tight">
                Advanced Dental Diagnosis <br> <span class="text-blue-600">Powered by AI</span>
            </h1>
            <p class="text-xl text-gray-600 mb-10">
                Upload your panoramic X-ray and get an instant, professional-grade analysis of your dental health.
            </p>
            <div class="flex justify-center gap-4">
                <a href="upload.html" class="bg-blue-600 text-white px-8 py-4 rounded-2xl font-bold text-lg hover:bg-blue-700 transition shadow-lg shadow-blue-200" data-i18n="nav_analyze">Analyze Now</a>
                <a href="profile.html" class="bg-white border-2 border-gray-200 text-gray-700 px-8 py-4 rounded-2xl font-bold text-lg hover:bg-gray-50 transition" data-i18n="nav_profile">View Profile</a>
            </div>
        </section>
    </main>

    <footer class="w-full bg-gray-900 text-white py-12">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <div class="flex items-center justify-center gap-2 mb-4">
                <div class="w-8 h-8 rounded-lg bg-blue-600 flex items-center justify-center">
                    <i data-lucide="smile" class="text-white w-5 h-5"></i>
                </div>
                <span class="text-xl font-bold">DentalAI</span>
            </div>
            <p class="text-gray-400 text-sm" data-i18n="footer_text">© 2026 DentalAI. All rights reserved.</p>
        </div>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
