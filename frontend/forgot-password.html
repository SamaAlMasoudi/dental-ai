<!DOCTYPE html>
<html lang="en" class="h-full" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DentalAI - Reset Password</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body class="h-full bg-gray-50 flex items-center justify-center p-4">
    <div class="max-w-md w-full space-y-8 bg-white p-8 rounded-2xl shadow-xl border border-gray-100">
        <div class="text-center">
            <div class="mx-auto h-12 w-12 rounded-xl bg-blue-600 flex items-center justify-center mb-4">
                <i data-lucide="key" class="text-white w-8 h-8"></i>
            </div>
            <h2 class="text-3xl font-extrabold text-gray-900" data-i18n="forgot_password_title">Reset Password</h2>
            <p class="mt-2 text-sm text-gray-600" data-i18n="forgot_password_subtitle">Enter your details to reset
                password</p>
        </div>

        <form class="mt-8 space-y-4" id="resetForm">
            <input type="text" name="name" required class="w-full px-4 py-3 border rounded-xl sm:text-sm"
                data-i18n="name_label" placeholder="Full Name">
            <input type="email" name="email" required class="w-full px-4 py-3 border rounded-xl sm:text-sm"
                data-i18n="email_label" placeholder="Email Address">
            <input type="password" name="new_password" id="new_password" required
                class="w-full px-4 py-3 border rounded-xl sm:text-sm" data-i18n="password_label"
                placeholder="New Password">
            <input type="password" id="confirm_password" required class="w-full px-4 py-3 border rounded-xl sm:text-sm"
                placeholder="Confirm New Password">

            <button type="submit"
                class="w-full flex justify-center py-3 px-4 border border-transparent text-sm font-bold rounded-xl text-white bg-blue-600 hover:bg-blue-700 transition-all"
                data-i18n="reset_btn">
                Reset Password
            </button>
        </form>

        <div class="text-center mt-4">
            <a href="login.html" class="font-medium text-blue-600 hover:text-blue-500" data-i18n="sign_in_btn">Back to
                Login</a>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script>
        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());
            const confirmPass = document.getElementById('confirm_password').value;

            if (data.new_password !== confirmPass) {
                Swal.fire({
                    text: currentLang === 'ar' ? 'كلمات المرور غير متطابقة!' : 'Passwords do not match!',
                    icon: 'error',
                    confirmButtonText: currentLang === 'ar' ? 'حسناً' : 'OK'
                });
                return;
            }

            try {
                const response = await fetch('http://127.0.0.1:5000/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await response.json();
                if (result.success) {
                    Swal.fire({
                        text: currentLang === 'ar' ? 'تم تحديث كلمة المرور بنجاح!' : 'Password updated successfully!',
                        icon: 'success',
                        confirmButtonText: currentLang === 'ar' ? 'حسناً' : 'OK'
                    }).then(() => {
                        window.location.href = 'login.html';
                    });
                } else {
                    Swal.fire({
                        text: result.message,
                        icon: 'error',
                        confirmButtonText: currentLang === 'ar' ? 'حسناً' : 'OK'
                    });
                }
            } catch (error) {
                Swal.fire({
                    text: 'Connection error',
                    icon: 'error',
                    confirmButtonText: currentLang === 'ar' ? 'حسناً' : 'OK'
                });
            }
        });
    </script>

</body>

</html>
